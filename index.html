<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jump - CrazyGames</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.4);
            border-radius: 12px;
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
            border-radius: 12px;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 52px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.4);
            font-family: 'Courier New', monospace;
        }

        #highScore {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
        }

        #combo {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #ffff00;
            text-shadow: 0 0 15px rgba(255, 255, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            border-radius: 12px;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 56px;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.8), 0 0 60px rgba(0, 255, 255, 0.4);
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 30px rgba(0, 255, 255, 0.8), 0 0 60px rgba(0, 255, 255, 0.4); }
            50% { transform: scale(1.05); text-shadow: 0 0 40px rgba(0, 255, 255, 1), 0 0 80px rgba(0, 255, 255, 0.6); }
        }

        .btn {
            padding: 18px 50px;
            font-size: 24px;
            background: linear-gradient(135deg, transparent 0%, rgba(0,255,255,0.1) 100%);
            border: 3px solid #00ffff;
            color: #00ffff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 3px;
            margin: 10px;
            font-family: 'Courier New', monospace;
        }

        .btn:hover {
            background: #00ffff;
            color: #0a0a0a;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
            transform: scale(1.05);
        }

        .instructions {
            color: #aaa;
            margin-top: 30px;
            font-size: 15px;
            text-align: center;
            line-height: 1.8;
            max-width: 300px;
        }

        .instructions strong {
            color: #00ffff;
        }

        .finalScore {
            font-size: 42px;
            color: #ff00ff;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.8);
            font-family: 'Courier New', monospace;
        }

        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 120px;
            display: none;
            pointer-events: auto;
        }

        .controlZone {
            position: absolute;
            bottom: 0;
            width: 33%;
            height: 100%;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: rgba(0, 255, 255, 0.5);
            transition: all 0.1s;
        }

        .controlZone:active {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.5);
        }

        #leftZone { left: 10px; }
        #jumpZone { left: 50%; transform: translateX(-50%); width: 30%; }
        #rightZone { right: 10px; }

        .powerup-indicator {
            position: absolute;
            top: 130px;
            left: 20px;
            font-size: 14px;
            color: #ffff00;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui">
            <div id="score">0</div>
            <div id="highScore">High Score: 0</div>
            <div id="combo"></div>
            <div id="powerup-indicator" class="powerup-indicator"></div>
        </div>
        <div id="mobileControls">
            <div id="leftZone" class="controlZone">←</div>
            <div id="jumpZone" class="controlZone">↑</div>
            <div id="rightZone" class="controlZone">→</div>
        </div>
        <div id="startScreen">
            <h1>NEON JUMP</h1>
            <button class="btn" onclick="startGame()">PLAY</button>
            <div class="instructions">
                <strong>CONTROLS:</strong><br>
                ← → or A D : Move<br>
                SPACE or ↑ : Jump<br>
                <br>
                Collect coins, use springs,<br>
                don't fall, survive!
            </div>
        </div>
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <div class="finalScore">Score: <span id="finalScore">0</span></div>
            <button class="btn" onclick="restartGame()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('neonJumpHighScore') || 0;
        let camera = 0;
        let difficulty = 1;
        let combo = 0;
        let comboTimer = 0;
        
        // Update high score display
        document.getElementById('highScore').textContent = `High Score: ${highScore}`;
        
        // Input state
        const keys = {
            left: false,
            right: false,
            up: false
        };
        
        // Player
        const player = {
            x: 185,
            y: 350,
            width: 28,
            height: 28,
            vx: 0,
            vy: 0,
            speed: 6,
            jumpPower: -13,
            gravity: 0.55,
            color: '#00ffff',
            trail: [],
            facing: 1, // 1 = right, -1 = left
            powerup: null,
            powerupTime: 0
        };
        
        // Platforms, particles, coins, powerups
        let platforms = [];
        let particles = [];
        let coins = [];
        let powerups = [];
        let springs = [];
        let stars = [];
        
        // Background stars
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.1,
                    brightness: Math.random()
                });
            }
        }
        
        // Initialize platforms
        function initPlatforms() {
            platforms = [];
            for (let i = 0; i < 8; i++) {
                platforms.push(createPlatform(500 - i * 80));
            }
            // Starting platform
            platforms[0] = { x: 140, y: 450, width: 120, height: 15, type: 'static', vx: 0 };
        }
        
        function createPlatform(y) {
            const rand = Math.random();
            let type = 'static';
            if (rand > 0.85) type = 'moving';
            else if (rand > 0.75) type = 'breakable';
            
            return {
                x: Math.random() * (canvas.width - 100),
                y: y,
                width: 70 + Math.random() * 50,
                height: 15,
                type: type,
                vx: type === 'moving' ? (Math.random() - 0.5) * 3 : 0,
                broken: false
            };
        }
        
        // Particle system
        function createParticles(x, y, color, count = 8, speed = 4) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed * Math.random(),
                    vy: Math.sin(angle) * speed * Math.random(),
                    life: 40,
                    color: color,
                    size: Math.random() * 5 + 2
                });
            }
        }
        
        // Spawn collectible items
        function spawnItems() {
            if (platforms.length === 0) return;
            const platform = platforms[platforms.length - 1];
            
            // Coins
            if (Math.random() > 0.6 && coins.length < 4) {
                coins.push({
                    x: platform.x + platform.width / 2,
                    y: platform.y - 35,
                    size: 10,
                    collected: false,
                    pulse: 0,
                    value: 10
                });
            }
            
            // Springs
            if (Math.random() > 0.9 && springs.length < 2 && platform.type !== 'breakable') {
                springs.push({
                    x: platform.x + platform.width / 2 - 10,
                    y: platform.y - 15,
                    width: 20,
                    height: 15,
                    used: false
                });
            }
            
            // Powerups
            if (Math.random() > 0.95 && powerups.length < 1) {
                const types = ['jetpack', 'shield', 'magnet'];
                powerups.push({
                    x: platform.x + platform.width / 2,
                    y: platform.y - 40,
                    type: types[Math.floor(Math.random() * types.length)],
                    size: 15,
                    collected: false,
                    pulse: 0
                });
            }
        }
        
        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') {
                if (!keys.up) jump();
                keys.up = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') keys.up = false;
        });
        
        function jump() {
            if (!gameRunning) return;
            if (player.powerup === 'jetpack') {
                player.vy = -20;
                createParticles(player.x + player.width/2, player.y + player.height, '#ff6600', 15);
            } else {
                player.vy = player.jumpPower;
                createParticles(player.x + player.width/2, player.y + player.height, '#00ffff', 8);
            }
        }
        
        // Mobile touch controls
        const leftZone = document.getElementById('leftZone');
        const rightZone = document.getElementById('rightZone');
        const jumpZone = document.getElementById('jumpZone');
        
        function setupTouchControls() {
            // Left
            leftZone.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
            leftZone.addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; });
            
            // Right
            rightZone.addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
            rightZone.addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; });
            
            // Jump
            jumpZone.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if (!keys.up) jump();
                keys.up = true;
            });
            jumpZone.addEventListener('touchend', (e) => { e.preventDefault(); keys.up = false; });
        }
        
        setupTouchControls();
        
        // Detect mobile
        if ('ontouchstart' in window) {
            document.getElementById('mobileControls').style.display = 'block';
        }
        
        // Game functions
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            resetGame();
            gameRunning = true;
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            resetGame();
            gameRunning = true;
            gameLoop();
        }
        
        function resetGame() {
            player.x = 185;
            player.y = 400;
            player.vx = 0;
            player.vy = 0;
            player.trail = [];
            player.facing = 1;
            player.powerup = null;
            player.powerupTime = 0;
            score = 0;
            camera = 0;
            difficulty = 1;
            combo = 0;
            comboTimer = 0;
            particles = [];
            coins = [];
            powerups = [];
            springs = [];
            initStars();
            initPlatforms();
            updateScore();
            updateCombo();
            updatePowerup();
        }
        
        function updateScore() {
            document.getElementById('score').textContent = Math.floor(score);
        }
        
        function updateCombo() {
            const comboEl = document.getElementById('combo');
            if (combo > 1) {
                comboEl.textContent = `${combo}x COMBO!`;
                comboEl.style.opacity = '1';
            } else {
                comboEl.style.opacity = '0';
            }
        }
        
        function updatePowerup() {
            const indicator = document.getElementById('powerup-indicator');
            if (player.powerup) {
                indicator.textContent = `${player.powerup.toUpperCase()}: ${Math.ceil(player.powerupTime / 60)}s`;
                indicator.style.color = player.powerup === 'jetpack' ? '#ff6600' : 
                                        player.powerup === 'shield' ? '#00ff00' : '#ff00ff';
            } else {
                indicator.textContent = '';
            }
        }
        
        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('neonJumpHighScore', highScore);
                document.getElementById('highScore').textContent = `High Score: ${highScore}`;
            }
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        // Main game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw background stars
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
                const alpha = 0.3 + star.brightness * 0.7;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
            
            // Handle input
            if (keys.left) {
                player.vx = -player.speed;
                player.facing = -1;
            } else if (keys.right) {
                player.vx = player.speed;
                player.facing = 1;
            } else {
                player.vx *= 0.8; // Friction
            }
            
            // Update player physics
            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;
            
            // Magnet powerup - attract coins
            if (player.powerup === 'magnet') {
                coins.forEach(coin => {
                    const dx = (player.x + player.width/2) - coin.x;
                    const dy = (player.y + player.height/2) - coin.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) {
                        coin.x += dx * 0.05;
                        coin.y += dy * 0.05;
                    }
                });
            }
            
            // Player trail
            player.trail.push({ x: player.x, y: player.y, facing: player.facing });
            if (player.trail.length > 15) player.trail.shift();
            
            // Screen wrap
            if (player.x < -player.width) player.x = canvas.width;
            if (player.x > canvas.width) player.x = -player.width;
            
            // Camera follow
            if (player.y < 200 + camera) {
                let diff = (200 + camera) - player.y;
                camera -= diff;
                score += diff * 0.02;
                difficulty = 1 + score * 0.0005;
                updateScore();
                
                // Combo for climbing fast
                comboTimer++;
                if (comboTimer > 60) {
                    combo = 0;
                    comboTimer = 0;
                    updateCombo();
                }
            }
            
            // Powerup timer
            if (player.powerup) {
                player.powerupTime--;
                if (player.powerupTime <= 0) {
                    player.powerup = null;
                }
                updatePowerup();
            }
            
            // Cleanup off-screen items
            platforms = platforms.filter(p => p.y < camera + canvas.height + 100);
            coins = coins.filter(c => c.y < camera + canvas.height + 50 && !c.collected);
            powerups = powerups.filter(p => p.y < camera + canvas.height + 50 && !p.collected);
            springs = springs.filter(s => s.y < camera + canvas.height + 50);
            
            // Generate new platforms
            while (platforms.length < 12) {
                const lastY = platforms[platforms.length - 1]?.y || camera + 400;
                platforms.push(createPlatform(lastY - 70 - Math.random() * 40));
                spawnItems();
            }
            
            // Platform collision
            platforms.forEach(platform => {
                // Move platforms
                if (platform.type === 'moving' && !platform.broken) {
                    platform.x += platform.vx;
                    if (platform.x <= 0 || platform.x + platform.width >= canvas.width) {
                        platform.vx *= -1;
                    }
                }
                
                // Check collision (only when falling)
                if (player.vy > 0 &&
                    player.x + player.width > platform.x &&
                    player.x < platform.x + platform.width &&
                    player.y + player.height > platform.y &&
                    player.y + player.height < platform.y + platform.height + player.vy + 10 &&
                    !platform.broken) {
                    
                    if (platform.type === 'breakable') {
                        platform.broken = true;
                        createParticles(platform.x + platform.width/2, platform.y, '#ff6600', 10);
                    } else {
                        player.vy = player.jumpPower;
                        createParticles(player.x + player.width/2, player.y + player.height, '#ff00ff', 6);
                        
                        // Combo bonus
                        if (comboTimer < 60) {
                            combo++;
                            score += combo * 5;
                        }
                        comboTimer = 0;
                        updateCombo();
                    }
                }
            });
            
            // Spring collision
            springs.forEach(spring => {
                if (!spring.used &&
                    player.x + player.width > spring.x &&
                    player.x < spring.x + spring.width &&
                    player.y + player.height > spring.y &&
                    player.y + player.height < spring.y + spring.height + player.vy + 10) {
                    spring.used = true;
                    player.vy = -22;
                    createParticles(spring.x + 10, spring.y, '#00ff00', 12, 6);
                    score += 20;
                }
            });
            
            // Coin collision
            coins.forEach(coin => {
                coin.pulse += 0.15;
                const dx = (player.x + player.width/2) - coin.x;
                const dy = (player.y + player.height/2) - coin.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < player.width/2 + coin.size + 5) {
                    coin.collected = true;
                    score += coin.value + (combo * 2);
                    createParticles(coin.x, coin.y, '#ffff00', 8);
                    updateScore();
                }
            });
            
            // Powerup collision
            powerups.forEach(p => {
                p.pulse += 0.1;
                const dx = (player.x + player.width/2) - p.x;
                const dy = (player.y + player.height/2) - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < player.width/2 + p.size + 5) {
                    p.collected = true;
                    player.powerup = p.type;
                    player.powerupTime = 600; // 10 seconds at 60fps
                    createParticles(p.x, p.y, p.type === 'jetpack' ? '#ff6600' : 
                                               p.type === 'shield' ? '#00ff00' : '#ff00ff', 15);
                    updatePowerup();
                }
            });
            
            // Draw platforms
            platforms.forEach(platform => {
                if (platform.broken) return;
                
                let color = '#00ffff';
                let shadowColor = '#00ffff';
                if (platform.type === 'moving') { color = '#ff00ff'; shadowColor = '#ff00ff'; }
                if (platform.type === 'breakable') { color = '#ff6600'; shadowColor = '#ff6600'; }
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = shadowColor;
                ctx.fillStyle = color;
                
                // Platform glow
                ctx.fillRect(platform.x, platform.y - camera, platform.width, platform.height);
                
                // Platform highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(platform.x, platform.y - camera, platform.width, 3);
                
                ctx.shadowBlur = 0;
            });
            
            // Draw springs
            springs.forEach(spring => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ff00';
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(spring.x, spring.y - camera, spring.width, spring.height);
                // Coil detail
                ctx.strokeStyle = '#004400';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(spring.x + 5, spring.y - camera + 5);
                ctx.lineTo(spring.x + spring.width - 5, spring.y - camera + 5);
                ctx.moveTo(spring.x + 5, spring.y - camera + 10);
                ctx.lineTo(spring.x + spring.width - 5, spring.y - camera + 10);
                ctx.stroke();
                ctx.shadowBlur = 0;
            });
            
            // Draw coins
            coins.forEach(coin => {
                const pulseSize = Math.sin(coin.pulse) * 3;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffff00';
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y - camera, coin.size + pulseSize, 0, Math.PI * 2);
                ctx.fill();
                // Shine
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(coin.x - 3, coin.y - camera - 3, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // Draw powerups
            powerups.forEach(p => {
                if (p.collected) return;
                const pulseSize = Math.sin(p.pulse) * 2;
                const color = p.type === 'jetpack' ? '#ff6600' : 
                             p.type === 'shield' ? '#00ff00' : '#ff00ff';
                ctx.shadowBlur = 25;
                ctx.shadowColor = color;
                ctx.fillStyle = color;
                ctx.fillRect(p.x - p.size/2 - pulseSize, p.y - camera - p.size/2 - pulseSize, 
                            p.size + pulseSize*2, p.size + pulseSize*2);
                ctx.shadowBlur = 0;
            });
            
            // Draw player trail
            player.trail.forEach((pos, i) => {
                const alpha = (i / player.trail.length) * 0.6;
                ctx.fillStyle = player.powerup === 'shield' ? `rgba(0, 255, 0, ${alpha})` : 
                               player.powerup === 'jetpack' ? `rgba(255, 102, 0, ${alpha})` :
                               player.powerup === 'magnet' ? `rgba(255, 0, 255, ${alpha})` :
                               `rgba(0, 255, 255, ${alpha})`;
                ctx.fillRect(pos.x, pos.y - camera, player.width, player.height);
            });
            
            // Draw player
            const playerColor = player.powerup === 'shield' ? '#00ff00' :
                               player.powerup === 'jetpack' ? '#ff6600' :
                               player.powerup === 'magnet' ? '#ff00ff' :
                               player.color;
            
            ctx.shadowBlur = player.powerup ? 35 : 25;
            ctx.shadowColor = playerColor;
            ctx.fillStyle = playerColor;
            ctx.fillRect(player.x, player.y - camera, player.width, player.height);
            
            // Player eyes (direction indicator)
            ctx.fillStyle = '#000';
            const eyeOffset = player.facing === 1 ? 18 : 4;
            ctx.fillRect(player.x + eyeOffset, player.y - camera + 6, 6, 6);
            ctx.fillRect(player.x + eyeOffset, player.y - camera + 16, 6, 6);
            
            ctx.shadowBlur = 0;
            
            // Update and draw particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life--;
                
                if (p.life > 0) {
                    ctx.globalAlpha = p.life / 40;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y - camera, p.size, p.size);
                    ctx.globalAlpha = 1;
                    return true;
                }
                return false;
            });
            
            // Check death (unless shield active)
            if (player.y - camera > canvas.height && player.powerup !== 'shield') {
                gameOver();
                return;
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // Initial draw
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
